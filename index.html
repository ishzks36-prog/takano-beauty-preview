<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>たかの友梨ビューティー — Banner Preview</title>
<style>
:root {
  --bg: #0f0f10;
  --surface: #1a1a1d;
  --surface2: #24242a;
  --border: #2c2c34;
  --text: #ececec;
  --muted: #8e8e98;
  --accent: #ff3d7f;
  --good: #22c55e;
  --bad: #ef4444;
  --pink: #f472b6;
  --gold: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif; min-height: 100vh; }

/* Password gate */
.gate {
  position: fixed; inset: 0; background: radial-gradient(circle at 50% 30%, #2a1a2e 0%, #0f0f10 70%);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.gate-box { background: var(--surface); padding: 40px; border-radius: 16px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); }
.gate-box h1 { font-size: 18px; margin-bottom: 8px; }
.gate-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
.gate-box input { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; text-align: center; }
.gate-box button { width: 100%; margin-top: 12px; padding: 12px; background: var(--accent); border: 0; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; }
.gate-box .err { color: var(--bad); font-size: 12px; margin-top: 8px; min-height: 16px; }

/* Header */
header { position: sticky; top: 0; z-index: 50; background: rgba(15,15,16,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 16px 24px; }
.header-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.logo { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
.logo .brand { color: var(--accent); }
.stats { color: var(--muted); font-size: 12px; margin-left: auto; }
.stats span { color: var(--text); font-weight: 600; }
.stats .good-c { color: var(--good); }
.stats .bad-c { color: var(--bad); }

.controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.controls select, .controls input[type="search"], .controls button {
  background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 8px; font-size: 13px;
}
.controls input[type="search"] { min-width: 200px; }
.controls button { cursor: pointer; }
.controls button:hover { background: var(--surface2); }
.controls button.primary { background: var(--accent); border-color: var(--accent); }

.filter-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.filter-tabs button { padding: 6px 12px; font-size: 12px; background: transparent; border: 1px solid var(--border); color: var(--muted); border-radius: 999px; cursor: pointer; }
.filter-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Grid */
main { padding: 24px; max-width: 1600px; margin: 0 auto; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
@media (max-width: 1100px) { .grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 800px) { .grid { grid-template-columns: repeat(2, 1fr); } }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; cursor: pointer; transition: transform .12s, border-color .12s; }
.card:hover { transform: translateY(-2px); border-color: var(--accent); }
.card .img-wrap { position: relative; aspect-ratio: 1/1; background: #000; overflow: hidden; }
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card .tags { position: absolute; top: 8px; left: 8px; display: flex; gap: 4px; flex-wrap: wrap; }
.card .tag { padding: 3px 7px; background: rgba(0,0,0,.7); border-radius: 6px; font-size: 10px; font-weight: 600; letter-spacing: .02em; }
.card .tag.concept-A { background: rgba(244, 114, 182, 0.9); }
.card .tag.concept-B { background: rgba(59, 130, 246, 0.9); }
.card .tag.concept-C { background: rgba(251, 191, 36, 0.9); }
.card .tag.concept-D { background: rgba(34, 197, 94, 0.9); }
.card .rating-badge { position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; border-radius: 50%; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.card .rating-badge.good { background: var(--good); }
.card .rating-badge.bad { background: var(--bad); }
.card .meta { padding: 10px 12px; border-top: 1px solid var(--border); }
.card .copy-text { font-size: 13px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; min-height: 36px; }
.card .sub { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); }
.card .quick { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity .15s; }
.card:hover .quick { opacity: 1; }
.card .quick button { width: 32px; height: 32px; border-radius: 50%; border: 0; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
.card .quick .btn-good { background: var(--good); color: white; }
.card .quick .btn-bad { background: var(--bad); color: white; }

/* Modal */
.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; overflow: auto; }
.modal.on { display: flex; }
.modal-box { display: flex; gap: 20px; max-width: 1100px; width: 100%; align-items: flex-start; }
.iphone-frame { flex: 0 0 375px; }
.iphone { position: relative; width: 375px; background: #000; border: 1px solid #333; border-radius: 40px; padding: 10px; box-shadow: 0 20px 60px rgba(0,0,0,.6); overflow: hidden; }
.iphone-screen { background: #000; border-radius: 30px; overflow: hidden; }
.dynamic-island { width: 110px; height: 30px; background: #000; border-radius: 20px; margin: 6px auto 10px; position: relative; z-index: 2; }
.ig-topbar { display: flex; align-items: center; padding: 8px 12px; background: #000; border-bottom: 1px solid #1a1a1a; }
.ig-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; }
.ig-name-wrap { margin-left: 10px; flex: 1; }
.ig-name { font-size: 12px; font-weight: 600; }
.ig-sponsored { font-size: 10px; color: #888; }
.ig-more { color: #fff; font-size: 18px; letter-spacing: 2px; }
.ig-img { aspect-ratio: 1/1; background: #111; }
.ig-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ig-actions { display: flex; padding: 8px 12px; gap: 14px; font-size: 22px; }
.ig-actions .spacer { flex: 1; }
.ig-cta { margin: 0 12px 8px; padding: 10px; background: #222; border-radius: 6px; text-align: center; font-size: 12px; font-weight: 600; color: white; border-bottom: 1px solid #333; }
.ig-likes { padding: 0 12px 4px; font-size: 12px; font-weight: 600; }
.ig-caption { padding: 0 12px 10px; font-size: 12px; line-height: 1.4; color: #ddd; }
.ig-caption .name { font-weight: 600; margin-right: 4px; }

.detail-panel { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; color: var(--text); }
.detail-panel h2 { font-size: 16px; margin-bottom: 16px; }
.detail-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.detail-row .label { flex: 0 0 90px; color: var(--muted); font-size: 12px; }
.detail-row .val { flex: 1; }
.detail-panel .prompt-block { background: var(--surface2); padding: 12px; border-radius: 8px; font-size: 11px; line-height: 1.5; color: var(--muted); margin-top: 12px; max-height: 180px; overflow: auto; }
.rate-btns { display: flex; gap: 8px; margin-top: 16px; }
.rate-btns button { flex: 1; padding: 12px; border-radius: 8px; border: 0; cursor: pointer; font-weight: 600; font-size: 13px; }
.rate-btns .btn-good { background: var(--good); color: white; }
.rate-btns .btn-bad { background: var(--bad); color: white; }
.rate-btns .btn-reset { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.rate-btns button.active { outline: 3px solid rgba(255,255,255,0.3); transform: scale(1.02); }
.nav-arrow { position: fixed; top: 50%; background: rgba(0,0,0,.7); border: 1px solid var(--border); color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
.nav-arrow.prev { left: 20px; }
.nav-arrow.next { right: 20px; }
.close-btn { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,.7); border: 1px solid var(--border); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 210; }

.keyhint { font-size: 11px; color: var(--muted); margin-top: 16px; line-height: 1.6; }
.kbd { display: inline-block; background: var(--surface2); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); font-family: monospace; font-size: 10px; }
</style>
</head>
<body>
<!-- Password Gate -->
<div class="gate" id="gate">
  <div class="gate-box">
    <h1>🔒 Takano Beauty — Preview</h1>
    <p>パスワードを入力してください</p>
    <input type="password" id="pwInput" placeholder="password" autocomplete="off">
    <button onclick="tryPw()">Unlock</button>
    <div class="err" id="pwErr"></div>
  </div>
</div>

<!-- Main UI -->
<div id="app" style="display:none;">
<header>
  <div class="header-row">
    <div class="logo">🎈 <span class="brand">たかの友梨</span> Banner Preview</div>
    <div class="stats" id="stats"></div>
  </div>
  <!-- Round tabs -->
  <div class="controls" style="margin-top:10px;border-bottom:1px solid var(--border);padding-bottom:10px;">
    <div class="filter-tabs" id="roundTabs" style="flex-wrap:wrap;gap:6px;">
      <button data-round="" class="active">📊 全て</button>
      <button data-round="round1">Round 1 (初稿16枚)</button>
      <button data-round="round2-clean">Round 2 / 純メイン</button>
      <button data-round="round2-annot-original">Round 2 / 白ストリップ注釈</button>
      <button data-round="round2-final">Round 2 / 溶込注釈(shrink型・旧)</button>
      <button data-round="round2-overlay">Round 2 Overlay / 画像切り詰めなし</button>
      <button data-round="round3">⭐ Round 3 / 4K素材参照版（最新8枚）</button>
    </div>
  </div>
  <div class="controls">
    <select id="sort">
      <option value="random">🔀 Random</option>
      <option value="concept">📁 Concept順</option>
      <option value="pattern">🎨 Pattern順</option>
      <option value="rated-first">⭐ 評価済み優先</option>
      <option value="unrated-first">❓ 未評価優先</option>
    </select>
    <input type="search" id="search" placeholder="🔍 コピー/N1で検索">
    <button onclick="exportGood()">📋 GOOD List Copy</button>
    <button onclick="resetAll()" title="全評価リセット">🧹 Reset All</button>
  </div>
  <div class="controls" style="margin-top:8px;">
    <div class="filter-tabs" id="filters">
      <button data-filter="all" class="active">All</button>
      <button data-filter="A">A: お母さんを降りる2時間</button>
      <button data-filter="B">B: あのワンピに、もう一度</button>
      <button data-filter="C">C: 私の、第二章を</button>
      <button data-filter="D">D: 勧誘なし</button>
      <button data-filter="good">❤️ GOOD</button>
      <button data-filter="bad">✕ BAD</button>
      <button data-filter="unrated">❓ 未評価</button>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div style="margin-top:40px;color:var(--muted);font-size:12px;text-align:center;">
    ⌨️ <span class="kbd">←</span> <span class="kbd">→</span> ナビ / <span class="kbd">G</span> GOOD / <span class="kbd">B</span> BAD / <span class="kbd">R</span> Reset / <span class="kbd">Esc</span> Close
  </div>
</main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <button class="close-btn" onclick="closeModal()">✕</button>
  <button class="nav-arrow prev" onclick="nav(-1)">←</button>
  <button class="nav-arrow next" onclick="nav(1)">→</button>
  <div class="modal-box">
    <div class="iphone-frame">
      <div class="iphone">
        <div class="iphone-screen">
          <div class="dynamic-island"></div>
          <div class="ig-topbar">
            <div class="ig-avatar">T</div>
            <div class="ig-name-wrap">
              <div class="ig-name">takano_yuri_beauty</div>
              <div class="ig-sponsored">Sponsored</div>
            </div>
            <div class="ig-more">⋯</div>
          </div>
          <div class="ig-img"><img id="igImg" src=""></div>
          <div class="ig-cta">Learn More →</div>
          <div class="ig-actions">
            <span>♡</span><span>💬</span><span>✈️</span><div class="spacer"></div><span>🔖</span>
          </div>
          <div class="ig-likes" id="igLikes">1,248 likes</div>
          <div class="ig-caption">
            <span class="name">takano_yuri_beauty</span><span id="igCaption"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="detail-panel">
      <h2 id="dCopy"></h2>
      <div class="detail-row"><div class="label">Concept</div><div class="val" id="dConcept"></div></div>
      <div class="detail-row"><div class="label">N1</div><div class="val" id="dN1"></div></div>
      <div class="detail-row"><div class="label">Pattern</div><div class="val" id="dPattern"></div></div>
      <div class="detail-row"><div class="label">Hook Angle</div><div class="val" id="dAngle"></div></div>
      <div class="rate-btns">
        <button class="btn-good" id="rbG" onclick="rate('good')">❤️ GOOD</button>
        <button class="btn-bad"  id="rbB" onclick="rate('bad')">✕ BAD</button>
        <button class="btn-reset" onclick="rate(null)">↺</button>
      </div>
      <div style="margin-top:16px;">
        <a id="dlLink" href="" download style="display:inline-block;padding:8px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:12px;">📥 Download (JPEG)</a>
      </div>
      <div class="prompt-block" id="dPrompt"></div>
    </div>
  </div>
</div>

<script>
const PASS_HASH = "41eea9ad";
const STORAGE_KEY = "takano_beauty_ratings_v1";

function simpleHash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return Math.abs(h).toString(16).slice(0,12);}
function tryPw(){const v=document.getElementById('pwInput').value;if(simpleHash(v)===PASS_HASH){sessionStorage.setItem('tb_auth','ok');showApp();}else{document.getElementById('pwErr').textContent='Incorrect password';}}
function showApp(){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';loadData();}
if(sessionStorage.getItem('tb_auth')==='ok'){showApp();}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')tryPw();});

let data=[], filtered=[], ratings={}, currentFilter='all', currentSort='random', currentIdx=-1, currentRound='';

async function loadData(){
  const r=await fetch('data.json');
  data=await r.json();
  try{ratings=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');}catch(e){ratings={};}
  try{
    const d=await fetch('default-ratings.json');
    if(d.ok){const defs=await d.json();for(const k in defs){if(!(k in ratings))ratings[k]=defs[k];}}
  }catch(e){}
  applyHashRound();
  render();
}

function applyHashRound(){
  // URL末尾 #round2-final などから現在のラウンドを決める
  const h=(location.hash||'').replace(/^#/,'');
  currentRound = h; // '' = 全て
  document.querySelectorAll('#roundTabs button').forEach(b=>{
    b.classList.toggle('active', (b.dataset.round||'')===currentRound);
  });
}
window.addEventListener('hashchange', ()=>{applyHashRound(); render();});

function render(){
  let arr=data.slice();
  // round filter (URL hash base)
  if(currentRound) arr=arr.filter(d=>d.group===currentRound);
  // filter
  if(currentFilter==='good')arr=arr.filter(d=>ratings[d.id]==='good');
  else if(currentFilter==='bad')arr=arr.filter(d=>ratings[d.id]==='bad');
  else if(currentFilter==='unrated')arr=arr.filter(d=>!ratings[d.id]);
  else if(['A','B','C','D'].includes(currentFilter))arr=arr.filter(d=>d.conceptId===currentFilter);
  // search
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(q)arr=arr.filter(d=>(d.copy||'').toLowerCase().includes(q)||(d.n1||'').toLowerCase().includes(q)||(d.concept||'').toLowerCase().includes(q));
  // sort
  if(currentSort==='random')arr.sort(()=>Math.random()-0.5);
  else if(currentSort==='concept')arr.sort((a,b)=>(a.conceptId+a.pattern).localeCompare(b.conceptId+b.pattern));
  else if(currentSort==='pattern')arr.sort((a,b)=>(a.pattern+a.conceptId).localeCompare(b.pattern+b.conceptId));
  else if(currentSort==='rated-first')arr.sort((a,b)=>(ratings[b.id]?1:0)-(ratings[a.id]?1:0));
  else if(currentSort==='unrated-first')arr.sort((a,b)=>(ratings[a.id]?1:0)-(ratings[b.id]?1:0));
  filtered=arr;
  // render grid
  const g=document.getElementById('grid');
  g.innerHTML=arr.map((d,i)=>{
    const rate=ratings[d.id];
    const badge=rate==='good'?'<div class="rating-badge good">❤</div>':rate==='bad'?'<div class="rating-badge bad">✕</div>':'';
    return `<div class="card" onclick="open1(${data.indexOf(d)})">
      <div class="img-wrap">
        <div class="tags">
          <span class="tag concept-${d.conceptId}">${d.conceptId}</span>
          <span class="tag" style="background:rgba(36,36,42,.9)">${d.patternLabel}</span>
        </div>
        ${badge}
        <img src="${d.thumb}" loading="lazy" alt="">
        <div class="quick">
          <button class="btn-good" onclick="event.stopPropagation();quickRate('${d.id}','good')" title="GOOD">❤</button>
          <button class="btn-bad" onclick="event.stopPropagation();quickRate('${d.id}','bad')" title="BAD">✕</button>
        </div>
      </div>
      <div class="meta">
        <div class="copy-text">${escapeHtml(d.copy||'(no copy)')}</div>
        <div class="sub"><span>${escapeHtml(d.n1.split(' ')[0])}</span><span>${escapeHtml(d.concept)}</span></div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

function escapeHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function updateStats(){
  const g=Object.values(ratings).filter(v=>v==='good').length;
  const b=Object.values(ratings).filter(v=>v==='bad').length;
  const u=data.length-g-b;
  document.getElementById('stats').innerHTML=`Total <span>${data.length}</span> / <span class="good-c">❤ ${g}</span> / <span class="bad-c">✕ ${b}</span> / 未評価 <span>${u}</span> — showing <span>${filtered.length}</span>`;
}

function quickRate(id,v){ratings[id]=v;localStorage.setItem(STORAGE_KEY,JSON.stringify(ratings));render();}
function open1(i){currentIdx=i;showDetail();document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');currentIdx=-1;}
function nav(dir){if(currentIdx<0)return;const list=filtered.length?filtered:data;const curIdInList=list.findIndex(d=>d===data[currentIdx]);let ni=curIdInList+dir;if(ni<0)ni=list.length-1;if(ni>=list.length)ni=0;currentIdx=data.indexOf(list[ni]);showDetail();}
function showDetail(){
  const d=data[currentIdx];
  document.getElementById('igImg').src=d.full;
  document.getElementById('igCaption').textContent=(d.copy?' '+d.copy:'')+' #たかの友梨 #エステ体験';
  document.getElementById('dCopy').textContent=d.copy||'(no copy)';
  document.getElementById('dConcept').innerHTML=`<strong>${escapeHtml(d.conceptId)}</strong> — ${escapeHtml(d.concept)}`;
  document.getElementById('dN1').textContent=d.n1;
  document.getElementById('dPattern').textContent=d.patternLabel;
  document.getElementById('dAngle').textContent=d.hookAngle||'-';
  document.getElementById('dPrompt').textContent=d.prompt||'(no prompt)';
  document.getElementById('dlLink').href=d.full;
  document.getElementById('dlLink').setAttribute('download',d.id+'.jpg');
  // Rating buttons highlight
  document.getElementById('rbG').classList.toggle('active',ratings[d.id]==='good');
  document.getElementById('rbB').classList.toggle('active',ratings[d.id]==='bad');
  // Random likes for realism
  document.getElementById('igLikes').textContent=(Math.floor(Math.random()*3000)+500).toLocaleString()+' likes';
}
function rate(v){if(currentIdx<0)return;const id=data[currentIdx].id;if(v)ratings[id]=v;else delete ratings[id];localStorage.setItem(STORAGE_KEY,JSON.stringify(ratings));showDetail();render();}
function resetAll(){if(!confirm('全ての評価をリセットしますか？'))return;ratings={};localStorage.removeItem(STORAGE_KEY);render();}
function exportGood(){const goods=data.filter(d=>ratings[d.id]==='good');const tsv=['ID\tConcept\tN1\tPattern\tCopy'].concat(goods.map(d=>`${d.id}\t${d.conceptId}\t${d.n1}\t${d.patternLabel}\t${d.copy||''}`)).join('\n');navigator.clipboard.writeText(tsv).then(()=>alert(`Copied ${goods.length} GOOD banners to clipboard (TSV)`));}

// Filter tabs
document.getElementById('filters').addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){document.querySelectorAll('#filters button').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');currentFilter=e.target.dataset.filter;render();}});
// Round tabs (updates URL hash)
document.getElementById('roundTabs').addEventListener('click',e=>{
  if(e.target.tagName==='BUTTON'){
    const r=e.target.dataset.round||'';
    location.hash = r ? '#'+r : '';
    if(!r){history.replaceState(null,'',location.pathname+location.search);applyHashRound();render();}
  }
});
// Sort
document.getElementById('sort').addEventListener('change',e=>{currentSort=e.target.value;render();});
// Search
document.getElementById('search').addEventListener('input',()=>render());
// Keyboard
document.addEventListener('keydown',e=>{if(currentIdx<0)return;if(e.key==='ArrowLeft')nav(-1);else if(e.key==='ArrowRight')nav(1);else if(e.key==='Escape')closeModal();else if(e.key==='g'||e.key==='G')rate('good');else if(e.key==='b'||e.key==='B')rate('bad');else if(e.key==='r'||e.key==='R')rate(null);});
</script>
</body>
</html>
